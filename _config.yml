# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "Benchmarking Alignments"
email:
  - michael.e.mcauliffe@gmail.com
  - kaylynn.m.gunter@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Crowd-sourcing a benchmark for English forced alignment
baseurl: "/mon-align" # the subpath of your site, e.g. /blog
# domain: "splaat-lab.github.io"
url: "https://splaat-lab.github.io/" # the base hostname & protocol for your site, e.g. http://example.com
# local testing config
# url: "https://splaat-lab.github.io/"
# domain: "splaat-lab.github.io"
# baseurl: ""

#twitter_username: jekyllrb
#github_username:  jekyll

# Build settings
theme: minima
plugins:
  - jekyll-feed
collections:
  workshop_materials:
    sort_by: order
    output: true
    permalink: /:collection/:name

kramdown:
  toc_levels: 1..3

